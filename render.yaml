services:
  - type: web
    name: safereach-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn -w 1 --threads 100 --bind 0.0.0.0:$PORT run:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SAFE_REACH_ENV
        value: production
      - key: FRONTEND_ORIGIN
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: VERCEL_ORIGIN_SUFFIX
        value: .vercel.app
      - key: SOCKETIO_CORS_ORIGINS
        value: "*"
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DB1_URL
        sync: false
      - key: DB2_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        sync: false
      - key: REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: BOOTSTRAP_CACHE_SECONDS
        value: "60"
      - key: GOOGLE_SERVICE_ACCOUNT_FILE
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_PHONE
        sync: false
      - key: TWILIO_TEST_TO_PHONE
        sync: false
      - key: SMS_TEST_MODE
        value: "true"
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: JSON_BACKUP_DIR
        value: /opt/render/project/src/backend/json_backups
