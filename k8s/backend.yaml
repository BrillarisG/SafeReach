apiVersion: apps/v1
kind: Deployment
metadata:
  name: safereach-backend
  namespace: safereach
spec:
  replicas: 2
  selector:
    matchLabels:
      app: safereach-backend
  template:
    metadata:
      labels:
        app: safereach-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/safereach-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: safereach-config
            - secretRef:
                name: safereach-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: safereach-backend
  namespace: safereach
spec:
  selector:
    app: safereach-backend
  ports:
    - port: 80
      targetPort: 5000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: safereach-backend-hpa
  namespace: safereach
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: safereach-backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
