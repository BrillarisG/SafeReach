apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: safereach-ingress
  namespace: safereach
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: app.safereach.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: safereach-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: safereach-backend
                port:
                  number: 80
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: safereach-backend
                port:
                  number: 80
