apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: safereach-redis-data
  namespace: safereach
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: safereach-redis
  namespace: safereach
spec:
  replicas: 1
  selector:
    matchLabels:
      app: safereach-redis
  template:
    metadata:
      labels:
        app: safereach-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: safereach-redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: safereach-redis
  namespace: safereach
spec:
  selector:
    app: safereach-redis
  ports:
    - port: 6379
      targetPort: 6379
